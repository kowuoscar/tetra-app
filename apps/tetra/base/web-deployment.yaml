apiVersion: apps/v1
kind: Deployment
metadata:
  name: tetra-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tetra-web
  template:
    metadata:
      labels:
        app: tetra-web
    spec:
      containers:
        - name: tetra-web
          image: tetramobile/tetra-web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: tetra-web-config
                  key: NEXT_PUBLIC_API_URL
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
