apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tetra-production
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/tetramobile/tetra-gitops.git
    targetRevision: main
    path: apps/tetra/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: tetra-production
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
